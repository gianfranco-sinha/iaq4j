# nginx reverse proxy for iaq4j
# Managed by: deploy/deploy.sh
# Certbot manages the ssl_certificate / ssl_certificate_key lines below.
#
# Rate-limit zone: 10 r/s per IP, burst of 20, shared 10 MB memory.
# Adjust rate and burst to taste before first deploy.
limit_req_zone $binary_remote_addr zone=iaq_api:10m rate=10r/s;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name enviro-sensors.uk www.enviro-sensors.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name enviro-sensors.uk www.enviro-sensors.uk;

    # Certbot populates these two lines automatically.
    ssl_certificate     /etc/letsencrypt/live/enviro-sensors.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enviro-sensors.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # Hide upstream version info
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # ── iaq4j API at /iaq/ ─────────────────────────────────────────────────
    location /iaq/ {
        # Rate limiting: burst of 20 requests, no delay for first 10
        limit_req zone=iaq_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8001/iaq/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — predictions are fast; be generous for large requests
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;

        # Block direct access to internal/debug paths
        location ~ ^/iaq/(docs|redoc|openapi\.json) {
            # Allow in development; restrict in production by adding:
            # allow 127.0.0.1; deny all;
            proxy_pass http://127.0.0.1:8001$request_uri;
        }
    }

    # Block common scanners/bots at the nginx layer
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
}
