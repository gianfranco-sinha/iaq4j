# ============================================================================
# Model Configuration File for iaq4j
# ============================================================================
# Scope: Any indoor air quality sensor, any indoor IAQ standard, ML-driven
# prediction.  Modify these values to adjust model architecture and behavior.

# Global settings that apply to all models
global:
  # Fallback window_size used if a model does not define its own.
  # Each model section should declare its own window_size — see notes below.
  window_size: 10
  # Number of input features (4 raw + 6 engineered: voc_ratio, abs_humidity, hour_sin, hour_cos, dow_sin, dow_cos)
  num_features: 10
  # Default device for inference (cpu/cuda)
  device: "cpu"
  # Dropout rate shared across models (can be overridden per model)
  default_dropout: 0.2

# MLP (Multi-Layer Perceptron) configuration
mlp:
  # Architecture parameters
  hidden_dims: [64, 32, 16]    # Hidden layer dimensions
  dropout: 0.2                  # Dropout rate (overrides global.default_dropout)
  activation: "relu"           # Activation function (relu/tanh/sigmoid)
  use_batch_norm: true         # Whether to use batch normalization
  # Input parameters
  input_dim: 10                # Number of input features
  # MLP flattens the window — temporal order is ignored. A small window keeps
  # input_dim manageable without losing much signal.
  window_size: 10

# KAN (Kolmogorov-Arnold Networks) configuration
kan:
  # Architecture parameters
  hidden_dims: [32, 16]        # Hidden layer dimensions
  # Input parameters
  input_dim: 10                # Number of input features
  # KAN-specific parameters
  grid_size: 5                 # Grid size for KAN
  spline_order: 3              # Spline order for KAN
  # KAN flattens the window like MLP — small window is fine.
  window_size: 10

# LSTM (Long Short-Term Memory) configuration
lstm:
  # Architecture parameters
  hidden_size: 128             # LSTM hidden state size
  num_layers: 2                # Number of LSTM layers
  dropout: 0.3                 # Dropout rate (overrides global.default_dropout)
  bidirectional: true          # Whether to use bidirectional LSTM
  # Input parameters
  # LSTM exploits temporal ordering. At BME680 LP mode (~3 s/sample), 60 readings
  # = ~3 minutes of context — enough to capture VOC stabilisation dynamics.
  window_size: 60
  num_features: 10             # Number of input features (overrides global.num_features)
  # Fully connected layers after LSTM
  fc_layers: [64, 32]          # FC layer dimensions before output

# CNN (Convolutional Neural Network) configuration
cnn:
  # Convolutional layer parameters
  num_filters: [64, 128, 256]  # Number of filters for each conv layer
  kernel_sizes: [3, 3, 3]      # Kernel sizes for each conv layer
  dropout: 0.3                 # Dropout rate (overrides global.default_dropout)
  # Input parameters
  # CNN needs enough temporal width for kernels to detect meaningful patterns.
  # At ~3 s/sample, 30 readings = ~90 seconds of context.
  window_size: 30
  num_features: 10             # Number of input features (overrides global.num_features)
  # Fully connected layers after convolutions
  fc_layers: [128, 64]         # FC layer dimensions before output

# BNN (Bayesian Neural Network) configuration
bnn:
  # Architecture parameters (same hidden dims as MLP)
  hidden_dims: [64, 32, 16]     # Hidden layer dimensions
  prior_sigma: 1.0               # Prior weight distribution std (N(0, prior_sigma))
  kl_weight: 1.0                 # KL divergence weight in ELBO loss
  # Input parameters
  input_dim: 6                   # Number of input features
  # BNN flattens the window like MLP — small window is fine.
  window_size: 10
  # User-declared prior variables — external signals that shift the predictive
  # distribution via Gaussian conjugate update (no retraining required).
  prior_variables:
    presence:
      description: "mm-wave radar body detection"
      type: boolean
      values:
        "true":
          target_shift: 40.0     # Expected IAQ increase when body present
          prior_std: 30.0        # Uncertainty (smaller = stronger prior)
        "false":
          target_shift: 0.0
          prior_std: 100.0       # Weak prior when no body

# Sensor configuration — valid ranges for outlier filtering during preprocessing
sensor:
  type: bme680
  identity:
    sensor_id: null          # e.g. "bme680-A4:CF:12:8B:3E:01"
    firmware_version: null   # e.g. "2.6.1.0"
  # Column names — single source of truth for pipeline field references
  features: [temperature, rel_humidity, pressure, voc_resistance]
  target: iaq
  # Field mapping: external column name -> internal name
  field_mapping:
    gas_resistance: voc_resistance
  valid_ranges:
    temperature: [-40, 85]           # °C (BME680 full operating range)
    rel_humidity: [0, 100]           # % r.H.
    pressure: [300, 1100]            # hPa
    voc_resistance: [1000, 2000000]  # Ohm (<1kΩ = sensor fault, >2MΩ = unreasonable)
    iaq_accuracy: [2, 3]             # BSEC accuracy (0=unreliable, 1=low, 2=medium, 3=high)

# Field mapping — Tier 3 LLM backend configuration
field_mapping:
  ollama_model: "phi3:mini"              # Ollama model for field mapping (small + structured output)
  ollama_url: "http://localhost:11434"    # Ollama server URL

# IAQ standard — selects the target scale and category breakpoints
iaq_standard:
  type: bsec                         # Registered IAQStandard name (see app/builtin_profiles.py)

# Label Studio configuration — used by LabelStudioDataSource
label_studio:
  url: "http://localhost:8080"   # Label Studio server URL
  api_key: ""                    # API token (or set LABEL_STUDIO_API_KEY env var)
  project_id: null               # Integer project ID (required; can be overridden via CLI)

# Training configuration — read by TrainingPipeline and train_model()
training:
  epochs: 200
  batch_size: 32
  learning_rate: 0.001
  test_size: 0.2               # validation split ratio
  random_state: 42
  min_samples: 100             # minimum rows required after ingestion
  # LR scheduler (ReduceLROnPlateau)
  lr_scheduler_patience: 10
  lr_scheduler_factor: 0.5
  # TensorBoard
  tensorboard_enabled: true          # write TensorBoard events during training
  tensorboard_log_dir: "runs"        # base directory for TensorBoard logs
  tensorboard_histogram_freq: 50     # log weight/gradient histograms every N epochs (0 = off)